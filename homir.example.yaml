# Homir exposes APT repositories at /apt/<upstream-name>/.
listen_address: ":8080"
data_directory: "./data"

upstreams:
  debian-security:
    kind: apt
    security: true
    # Signed upstream metadata is refreshed every 30 minutes by default.
    primary: "https://deb.debian.org/debian-security"
    backups: []
