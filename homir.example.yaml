# Homir exposes APT repositories at /apt/<upstream-name>/ and Alpine
# repositories at /apk/<upstream-name>/.
listen_address: ":8080"
data_directory: "./data"

# The lightweight admin dashboard is available at /admin/ when a password is
# configured. Prefer setting HOMIR_ADMIN_PASSWORD in the container environment.
admin:
  username: admin
  # password_hash: "$argon2id$..."

cache:
  # Defaults shown explicitly: 50 GB, 30 days, and hourly cleanup.
  max_size_bytes: 50000000000
  inactivity_ttl: "720h"
  cleanup_interval: "1h"
  # Conditional refresh interval for artifacts that clients actually requested.
  watch_interval: "24h"

upstreams:
  debian-security:
    kind: apt
    security: true
    # Signed upstream metadata is refreshed every 30 minutes by default.
    primary: "https://deb.debian.org/debian-security"
    backups: []

  alpine-main:
    kind: apk
    primary: "https://dl-cdn.alpinelinux.org/alpine/v3.22/main"
    backups: []

  pypi:
    kind: pypi
    primary: "https://pypi.org"
    backups: []
