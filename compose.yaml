services:
  homir:
    image: ${HOMIR_IMAGE:-ghcr.io/kumatea/homir:latest}
    container_name: homir
    restart: unless-stopped
    ports:
      - "${HOMIR_PORT:-80}:8080"
    environment:
      HOMIR_ADMIN_PASSWORD: ${HOMIR_ADMIN_PASSWORD:?set a strong admin password in your shell or .env file}
    volumes:
      - ${HOMIR_CONFIG_DIR:-./config}:/etc/homir
      - ${HOMIR_DATA:-./data}:/var/lib/homir
